<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Coding Challenge - Python IDE</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <script src="https://cdn.jsdelivr.net/pyodide/v0.25.1/full/pyodide.js"></script>
        <script>
            tailwind.config = {
                theme: {
                    extend: {
                        colors: {},
                    },
                },
            };
        </script>
        <link rel="stylesheet" href="style.css" />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
            rel="stylesheet"
        />
    </head>
    <body class="text-gray-800">
        <div
            class="header-container w-full py-3 px-6 bg-transparent flex flex-col items-center"
        >
            <div class="flex items-center space-x-4">
                <button
                    id="run-code-btn"
                    class="bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 px-4 rounded-md transition duration-150 ease-in-out disabled:opacity-60 disabled:cursor-not-allowed text-sm"
                >
                    Run Code
                </button>
            </div>
        </div>

        <div class="main-content-area" id="main-container">
            <div id="problem-pane" class="pane problem-pane">
                <h1
                    id="problem-title"
                    class="text-2xl font-semibold text-gray-700 mb-2"
                >
                    Loading Question...
                </h1>
                <div
                    id="problem-text-container"
                    class="text-gray-600 text-sm space-y-2 problem-text"
                >
                    <p>
                        Please wait while the question content is being loaded.
                    </p>
                </div>
            </div>

            <div
                id="vertical-splitter"
                class="splitter splitter-vertical"
            ></div>

            <div id="right-container" class="flex flex-col flex-grow">
                <div id="editor-pane" class="pane editor-pane">
                    <label
                        for="code-editor"
                        class="block text-sm font-medium text-gray-600 mb-1 sr-only"
                        >Your Python Code:</label
                    >
                    <div id="editor-wrapper">
                        <div id="line-numbers" aria-hidden="true"></div>
                        <textarea
                            id="code-editor"
                            rows="10"
                            spellcheck="false"
                            placeholder="Enter your Python code here..."
                            autocomplete="off"
                            autocorrect="off"
                            autocapitalize="off"
                        ></textarea>
                    </div>
                </div>

                <div
                    id="horizontal-splitter"
                    class="splitter splitter-horizontal"
                ></div>

                <div id="output-pane" class="pane output-pane">
                    <h3 class="text-md font-medium text-gray-700 mb-1">
                        Console Output:
                        <span
                            id="console-summary"
                            class="text-sm font-normal text-gray-500"
                        ></span>
                    </h3>
                    <div
                        id="console-output-container"
                        class="console-output-container"
                    ></div>
                </div>
            </div>
        </div>

        <script>
            const codeEditor = document.getElementById("code-editor");
            const lineNumbersDiv = document.getElementById("line-numbers");
            const runCodeBtn = document.getElementById("run-code-btn");
            const consoleOutputContainer = document.getElementById(
                "console-output-container",
            );
            const consoleSummaryEl = document.getElementById("console-summary");
            // const pyodideLoadingStatus = document.getElementById( // Removed
            //  "pyodide-loading-status",
            // );
            const problemTitleElement =
                document.getElementById("problem-title");
            const problemTextContainer = document.getElementById(
                "problem-text-container",
            );

            const problemPane = document.getElementById("problem-pane");
            const rightContainer = document.getElementById("right-container");
            const editorPane = document.getElementById("editor-pane");
            const outputPane = document.getElementById("output-pane");
            const verticalSplitter =
                document.getElementById("vertical-splitter");
            const horizontalSplitter = document.getElementById(
                "horizontal-splitter",
            );
            const mainContainer = document.getElementById("main-container");

            function makeResizable(
                splitterElement,
                firstElement,
                secondElement,
                direction,
            ) {
                let isDragging = false;
                let startX, startY, startFirstFlexBasis, startSecondFlexBasis;

                splitterElement.addEventListener("mousedown", (e) => {
                    e.preventDefault();
                    isDragging = true;
                    document.body.classList.add("no-select");
                    startX = e.clientX;
                    startY = e.clientY;

                    if (!firstElement.style.flexBasis)
                        firstElement.style.flexBasis =
                            (direction === "vertical"
                                ? firstElement.offsetWidth
                                : firstElement.offsetHeight) + "px";
                    if (!secondElement.style.flexBasis)
                        secondElement.style.flexBasis =
                            (direction === "vertical"
                                ? secondElement.offsetWidth
                                : secondElement.offsetHeight) + "px";

                    startFirstFlexBasis = parseFloat(
                        firstElement.style.flexBasis,
                    );
                    startSecondFlexBasis = parseFloat(
                        secondElement.style.flexBasis,
                    );

                    document.addEventListener("mousemove", onMouseMove);
                    document.addEventListener("mouseup", onMouseUp);
                });

                function onMouseMove(e) {
                    if (!isDragging) return;
                    e.preventDefault();
                    const deltaX = e.clientX - startX;
                    const deltaY = e.clientY - startY;
                    let newFirstFlexBasis, newSecondFlexBasis;

                    const mainContainerPaddingH =
                        parseFloat(
                            getComputedStyle(mainContainer).paddingLeft,
                        ) +
                        parseFloat(
                            getComputedStyle(mainContainer).paddingRight,
                        );

                    if (direction === "vertical") {
                        const containerWidth =
                            mainContainer.offsetWidth -
                            verticalSplitter.offsetWidth -
                            mainContainerPaddingH;
                        const minBasis = Math.max(100, containerWidth * 0.1);

                        newFirstFlexBasis = startFirstFlexBasis + deltaX;
                        newSecondFlexBasis = startSecondFlexBasis - deltaX;

                        if (newFirstFlexBasis < minBasis) {
                            newFirstFlexBasis = minBasis;
                            newSecondFlexBasis =
                                containerWidth - newFirstFlexBasis;
                        }
                        if (newSecondFlexBasis < minBasis) {
                            newSecondFlexBasis = minBasis;
                            newFirstFlexBasis =
                                containerWidth - newSecondFlexBasis;
                        }
                    } else {
                        const parentHeight =
                            rightContainer.offsetHeight -
                            horizontalSplitter.offsetHeight;
                        const minBasis = Math.max(80, parentHeight * 0.15);

                        newFirstFlexBasis = startFirstFlexBasis + deltaY;
                        newSecondFlexBasis = startSecondFlexBasis - deltaY;

                        if (newFirstFlexBasis < minBasis) {
                            newFirstFlexBasis = minBasis;
                            newSecondFlexBasis =
                                parentHeight - newFirstFlexBasis;
                        }
                        if (newSecondFlexBasis < minBasis) {
                            newSecondFlexBasis = minBasis;
                            newFirstFlexBasis =
                                parentHeight - newSecondFlexBasis;
                        }
                    }
                    firstElement.style.flexBasis = `${newFirstFlexBasis}px`;
                    secondElement.style.flexBasis = `${newSecondFlexBasis}px`;
                    firstElement.style.flexGrow = "0";
                    firstElement.style.flexShrink = "0";
                    secondElement.style.flexGrow = "0";
                    secondElement.style.flexShrink = "0";

                    updateLineNumbers();
                }

                function onMouseUp() {
                    if (!isDragging) return;
                    isDragging = false;
                    document.body.classList.remove("no-select");
                    document.removeEventListener("mousemove", onMouseMove);
                    document.removeEventListener("mouseup", onMouseUp);
                    updateLineNumbers();
                }
            }
            makeResizable(
                verticalSplitter,
                problemPane,
                rightContainer,
                "vertical",
            );
            makeResizable(
                horizontalSplitter,
                editorPane,
                outputPane,
                "horizontal",
            );

            function updateLineNumbers() {
                if (!codeEditor || !lineNumbersDiv) return;
                const editorStyle = window.getComputedStyle(codeEditor);
                const editorLineHeight = parseFloat(editorStyle.lineHeight);
                const editorFontSize = parseFloat(editorStyle.fontSize);
                const effectiveLineHeight = isNaN(editorLineHeight)
                    ? editorFontSize * 1.2
                    : editorLineHeight;
                const lines = codeEditor.value.split("\n");
                const numberOfLines = lines.length;
                lineNumbersDiv.innerHTML = "";
                for (let i = 1; i <= Math.max(1, numberOfLines); i++) {
                    const numberEl = document.createElement("div");
                    numberEl.textContent = i;
                    lineNumbersDiv.appendChild(numberEl);
                }
                lineNumbersDiv.scrollTop = codeEditor.scrollTop;
            }

            if (codeEditor) {
                codeEditor.addEventListener("input", updateLineNumbers);
                codeEditor.addEventListener("scroll", () => {
                    if (lineNumbersDiv) {
                        lineNumbersDiv.scrollTop = codeEditor.scrollTop;
                    }
                });
                codeEditor.addEventListener("keydown", function (e) {
                    if (e.key === "Enter") {
                        setTimeout(updateLineNumbers, 0);
                    } else if (e.key === "Tab") {
                        e.preventDefault();
                        const start = this.selectionStart;
                        const end = this.selectionEnd;
                        const tabSpaces = "  ";
                        this.value =
                            this.value.substring(0, start) +
                            tabSpaces +
                            this.value.substring(end);
                        this.selectionStart = this.selectionEnd =
                            start + tabSpaces.length;
                        setTimeout(updateLineNumbers, 0);
                    }
                });
                codeEditor.addEventListener("cut", () =>
                    setTimeout(updateLineNumbers, 0),
                );
                codeEditor.addEventListener("paste", () =>
                    setTimeout(updateLineNumbers, 0),
                );
            }

            let pyodide = null;
            let pyodideReady = false;
            let pyodideStdoutForTest = null;
            let pyodideStderrForTest = null;

            let currentTestCases = [];
            let currentQuestionData = null;

            function updateEditorWithPythonBoilerplate(
                paramNames = ["nums", "target"],
            ) {
                const functionSignature = `def function(${paramNames.join(", ")}):`;
                const pythonBoilerplate = `${functionSignature}
    # Your solution here
    # Example: print(f"Processing ${paramNames[0]}: {${paramNames[0]}}")
    print("Hello from function!")
    return []
`;
                codeEditor.value = pythonBoilerplate;
                updateLineNumbers();
                runCodeBtn.disabled = !pyodideReady;
                // pyodideLoadingStatus.style.display = pyodideReady // Removed
                //  ? "none"
                //  : "block";
            }

            function clearConsole() {
                consoleOutputContainer.innerHTML = "";
                consoleSummaryEl.textContent = "";
            }

            function appendToConsole(htmlMessage) {
                const entry = document.createElement("div");
                entry.innerHTML = htmlMessage;
                entry.classList.add("py-0.5");
                consoleOutputContainer.appendChild(entry);
                consoleOutputContainer.scrollTop =
                    consoleOutputContainer.scrollHeight;
            }

            function escapeHTML(text) {
                if (typeof text !== "string") text = String(text);
                return text
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;")
                    .replace(/"/g, "&quot;")
                    .replace(/'/g, "&#039;")
                    .replace(/\n/g, "<br>");
            }

            async function initializePyodide() {
                runCodeBtn.disabled = true;
                // pyodideLoadingStatus.style.display = "block"; // Removed
                try {
                    pyodide = await loadPyodide({
                        stdout: (text) => {
                            const message = text.replace(/\n$/, "");
                            if (pyodideStdoutForTest) {
                                pyodideStdoutForTest(message);
                            } else {
                                appendToConsole(
                                    `<span class="text-gray-700">${escapeHTML(message)}</span>`,
                                );
                            }
                        },
                        stderr: (text) => {
                            const message = text.replace(/\n$/, "");
                            if (pyodideStderrForTest) {
                                pyodideStderrForTest(message);
                            } else {
                                appendToConsole(
                                    `<span class="text-red-600">${escapeHTML(message)}</span>`,
                                );
                            }
                        },
                    });
                    appendToConsole(
                        `<span class="text-blue-700">Python environment ready.</span>`,
                    );
                    pyodideReady = true;
                    // runCodeBtn.disabled = false; // Already handled by updateEditorWithPythonBoilerplate or later logic
                    if (currentQuestionData) {
                        runCodeBtn.disabled = false;
                    } else {
                        runCodeBtn.disabled = true; // Keep disabled if no question yet
                    }
                } catch (error) {
                    console.error("Failed to load Pyodide:", error);
                    appendToConsole(
                        `<span class="text-red-700">Error loading Pyodide: ${escapeHTML(error.message)}</span>`,
                    );
                    // pyodideLoadingStatus.textContent = // Removed
                    //  "Failed to load Python environment.";
                    // pyodideLoadingStatus.style.color = "#EF4444"; // Removed
                    runCodeBtn.disabled = true;
                } finally {
                    // pyodideLoadingStatus.style.display = "none"; // Removed
                }
            }

            function parseDescriptionToHtml(description) {
                if (!description) return "<p>No description provided.</p>";
                description = description.replace(
                    /```([a-zA-Z]*)\n([\s\S]*?)\n```/g,
                    (match, lang, code) => {
                        const escapedCode = escapeHTML(code);
                        return `<pre class="bg-gray-100 p-2 rounded my-2 overflow-x-auto"><code class="language-${lang || ""}">${escapedCode}</code></pre>`;
                    },
                );

                description = description.replace(
                    /`([^`]+)`/g,
                    '<code class="problem-description-code">$1</code>',
                );

                const parts = description.split(/(\n\n+|\n(?!\s*<pre>))/);
                let html = "";
                parts.forEach((part) => {
                    if (part.trim().startsWith("<pre")) {
                        html += part;
                    } else if (part.trim()) {
                        if (
                            part.includes("<strong>Example") ||
                            part.includes("<strong>Constraints:") ||
                            part.includes("<em>Follow-up:")
                        ) {
                            html += `<div>${part.replace(/\n/g, "<br>")}</div>`;
                        } else {
                            html += `<p>${part.replace(/\n/g, "<br>")}</p>`;
                        }
                    }
                });
                if (!html.includes("<p>") && !html.includes("<pre")) {
                    html = description
                        .split("\n")
                        .map((line) => {
                            if (line.trim() === "") return "";
                            if (line.trim().startsWith("- ")) {
                                return `<ul><li class="ml-4 list-disc">${line.trim().substring(2)}</li></ul>`;
                            }
                            return `<p>${line}</p>`;
                        })
                        .join("");
                }

                let finalHtml = "";
                let inList = false;
                const lines = description.split("\n");
                for (let i = 0; i < lines.length; i++) {
                    let line = lines[i];
                    if (line.startsWith("```")) {
                        let codeBlock = line + "\n";
                        i++;
                        while (
                            i < lines.length &&
                            !lines[i].startsWith("```")
                        ) {
                            codeBlock += lines[i] + "\n";
                            i++;
                        }
                        if (i < lines.length) codeBlock += lines[i];
                        finalHtml += parseDescriptionToHtml(codeBlock);
                        continue;
                    }

                    line = line.replace(
                        /`([^`]+)`/g,
                        '<code class="problem-description-code">$1</code>',
                    );

                    if (line.trim().startsWith("- ")) {
                        if (!inList) {
                            finalHtml +=
                                '<ul class="list-disc list-inside ml-4 space-y-1">';
                            inList = true;
                        }
                        finalHtml += `<li>${line.trim().substring(2)}</li>`;
                    } else {
                        if (inList) {
                            finalHtml += "</ul>";
                            inList = false;
                        }
                        if (line.trim() !== "") {
                            if (
                                line.includes("<strong>Example") ||
                                line.includes("<strong>Constraints:") ||
                                line.includes("<em>Follow-up:")
                            ) {
                                finalHtml += `<div class="mt-2">${line}</div>`;
                            } else {
                                finalHtml += `<p>${line}</p>`;
                            }
                        } else if (
                            finalHtml.length > 0 &&
                            !finalHtml.endsWith("</p>") &&
                            !finalHtml.endsWith("</ul>") &&
                            !finalHtml.endsWith("</div>")
                        ) {
                            finalHtml += "<p>&nbsp;</p>";
                        }
                    }
                }
                if (inList) {
                    finalHtml += "</ul>";
                }
                return (
                    finalHtml ||
                    "<p>Error parsing description or description is empty.</p>"
                );
            }

            async function loadQuestionData(questionId) {
                runCodeBtn.disabled = true;
                problemTitleElement.textContent = `Loading Question ${questionId}...`;
                problemTextContainer.innerHTML =
                    "<p>Fetching question details...</p>";
                currentTestCases = [];
                currentQuestionData = null;

                try {
                    const response = await fetch(`${questionId}.json`);
                    if (!response.ok) {
                        throw new Error(
                            `Failed to load ${questionId}.json. Status: ${response.status}`,
                        );
                    }
                    const data = await response.json();
                    currentQuestionData = data;

                    document.title = `Q${questionId}: ${data.title || "Coding Challenge"} - Python IDE`;
                    problemTitleElement.textContent = data.title
                        ? `Q${questionId}: ${data.title}`
                        : `Question ${questionId}`;
                    problemTextContainer.innerHTML = parseDescriptionToHtml(
                        data.Description,
                    );

                    currentTestCases = data.test_cases || [];
                    updateEditorWithPythonBoilerplate(
                        // This will handle runCodeBtn.disabled based on pyodideReady
                        data.function_params_names,
                    );

                    if (pyodideReady) {
                        // Additional check to ensure button is enabled if Pyodide is ready
                        runCodeBtn.disabled = false;
                    }
                    clearConsole();
                    appendToConsole(
                        `<span class="text-blue-700">Successfully loaded Question ${questionId}.</span>`,
                    );
                } catch (error) {
                    console.error("Error loading question data:", error);
                    problemTitleElement.textContent = `Error Loading Question ${questionId}`;
                    problemTextContainer.innerHTML = `<p class="text-red-600">Could not load question data for ID ${questionId}. Please check if '${questionId}.json' exists and is accessible. Details: ${escapeHTML(error.message)}</p>`;
                    updateEditorWithPythonBoilerplate();
                    runCodeBtn.disabled = true;
                }
            }

            function compareArrays(arr1, arr2) {
                if (!arr1 && !arr2) return true;
                if (!arr1 || !arr2) return false;
                if (!Array.isArray(arr1) || !Array.isArray(arr2)) {
                    return String(arr1) === String(arr2);
                }
                if (arr1.length === 0 && arr2.length === 0) return true;
                if (arr1.length !== arr2.length) return false;

                const sortedArr1 = [...arr1].sort((a, b) =>
                    JSON.stringify(a).localeCompare(JSON.stringify(b)),
                );
                const sortedArr2 = [...arr2].sort((a, b) =>
                    JSON.stringify(a).localeCompare(JSON.stringify(b)),
                );

                return sortedArr1.every(
                    (val, index) =>
                        JSON.stringify(val) ===
                        JSON.stringify(sortedArr2[index]),
                );
            }

            runCodeBtn.addEventListener("click", async () => {
                if (!currentQuestionData) {
                    appendToConsole(
                        `<span class="text-red-600">No question loaded. Cannot run tests.</span>`,
                    );
                    return;
                }
                clearConsole();
                const userCode = codeEditor.value;
                let passedCount = 0;
                const startTime = performance.now();

                appendToConsole(
                    `<span class="text-blue-700">Running Python tests for Question ${currentQuestionData.id || "Current"}...</span>`,
                );

                if (!currentTestCases || currentTestCases.length === 0) {
                    appendToConsole(
                        `<span class="text-yellow-500">No test cases found for this question.</span>`,
                    );
                    consoleSummaryEl.textContent = `(0/0 passed) - 0.00 ms`;
                    return;
                }

                for (let i = 0; i < currentTestCases.length; i++) {
                    const testCase = currentTestCases[i];
                    let currentTestLogEntries = [];
                    let result;
                    let currentTestPassed = false;
                    let actualOutputStr = "Execution did not return a result.";
                    let executionErrorOccurred = false;

                    const inputParamsDisplay = Object.entries(testCase.input)
                        .map(
                            ([key, value]) =>
                                `${key}=${escapeHTML(JSON.stringify(value))}`,
                        )
                        .join(", ");

                    appendToConsole(
                        `<span class="text-gray-500">Test Case ${testCase.id || i + 1}: Input: ${inputParamsDisplay}</span>`,
                    );

                    try {
                        if (!pyodideReady || !pyodide) {
                            currentTestLogEntries.push({
                                type: "error",
                                text: "Python environment not ready.",
                            });
                            executionErrorOccurred = true;
                        } else {
                            pyodideStdoutForTest = (text) =>
                                currentTestLogEntries.push({
                                    type: "log",
                                    text: text,
                                });
                            pyodideStderrForTest = (text) =>
                                currentTestLogEntries.push({
                                    type: "error",
                                    text: text,
                                });

                            await pyodide.runPythonAsync(userCode);
                            const solutionFunc =
                                pyodide.globals.get("function");

                            if (typeof solutionFunc !== "function") {
                                throw new Error(
                                    "Main 'function' not defined in Python code.",
                                );
                            }

                            const pyFuncArgs =
                                currentQuestionData.function_params_names.map(
                                    (paramName) => {
                                        if (
                                            testCase.input.hasOwnProperty(
                                                paramName,
                                            )
                                        ) {
                                            return pyodide.toPy(
                                                testCase.input[paramName],
                                            );
                                        }
                                        console.warn(
                                            `Parameter '${paramName}' not found in test case input for test ${testCase.id}. Passing None.`,
                                        );
                                        return pyodide.globals.get("None");
                                    },
                                );

                            const pyResult = await solutionFunc(...pyFuncArgs);

                            result =
                                pyResult && typeof pyResult.toJs === "function"
                                    ? pyResult.toJs({ create_proxies: false })
                                    : pyResult;
                            if (
                                pyResult &&
                                typeof pyResult.destroy === "function"
                            ) {
                                pyResult.destroy();
                            }
                            pyFuncArgs.forEach((arg) => {
                                if (arg && typeof arg.destroy === "function") {
                                    arg.destroy();
                                }
                            });
                        }

                        if (!executionErrorOccurred) {
                            actualOutputStr = JSON.stringify(result);
                            currentTestPassed = compareArrays(
                                result,
                                testCase.output,
                            );
                        } else {
                            currentTestPassed = false;
                            actualOutputStr = "Error during execution";
                        }
                    } catch (error) {
                        currentTestLogEntries.push({
                            type: "error",
                            text: `Runtime Error: ${error.message}${error.stack ? `\nStack: ${error.stack.split("\n").slice(0, 5).join("\n")}` : ""}`,
                        });
                        actualOutputStr = `Error: ${error.message}`;
                        currentTestPassed = false;
                        executionErrorOccurred = true;
                    } finally {
                        pyodideStdoutForTest = null;
                        pyodideStderrForTest = null;
                    }

                    currentTestLogEntries.forEach((log) => {
                        const logColorClass =
                            log.type === "error"
                                ? "text-red-600"
                                : "text-gray-700";
                        appendToConsole(
                            `<span class="${logColorClass}">${escapeHTML(log.text)}</span>`,
                        );
                    });

                    const expectedOutputStr = JSON.stringify(testCase.output);
                    const statusText = currentTestPassed ? "PASSED" : "FAILED";
                    const resultLineColorClass = currentTestPassed
                        ? "text-green-600"
                        : "text-red-600";

                    let resultLineHtml =
                        `<span class="${resultLineColorClass}">` +
                        `Expected: <code class="problem-description-code"><span class="${resultLineColorClass}">${escapeHTML(expectedOutputStr)}</span></code> | ` +
                        `Got: <code class="problem-description-code"><span class="${resultLineColorClass}">${escapeHTML(actualOutputStr)}</span></code> - ` +
                        `<strong class="font-semibold ${resultLineColorClass}">${statusText}</strong>` +
                        `</span>`;
                    appendToConsole(resultLineHtml);

                    if (currentTestPassed && !executionErrorOccurred)
                        passedCount++;

                    if (i < currentTestCases.length - 1) {
                        appendToConsole(
                            `<span class="text-gray-400">---</span>`,
                        );
                    }
                }

                const endTime = performance.now();
                const duration = (endTime - startTime).toFixed(2);
                consoleSummaryEl.textContent = `(${passedCount}/${currentTestCases.length} passed) - ${duration} ms`;

                const allPassed =
                    passedCount === currentTestCases.length &&
                    currentTestCases.length > 0;
                const finalStatusColor = allPassed
                    ? "text-green-600"
                    : currentTestCases.length > 0
                      ? "text-red-600"
                      : "text-blue-700";

                if (allPassed) {
                    appendToConsole(
                        `<span class="${finalStatusColor} font-semibold">All tests passed!</span>`,
                    );
                } else if (currentTestCases.length > 0) {
                    appendToConsole(
                        `<span class="${finalStatusColor} font-semibold">Some tests failed.</span>`,
                    );
                } else {
                    appendToConsole(
                        `<span class="text-blue-700">No test cases were run.</span>`,
                    );
                }
            });

            function setInitialLayout() {
                requestAnimationFrame(() => {
                    const totalWidth = mainContainer.offsetWidth;
                    const mainContainerPaddingLR =
                        parseFloat(
                            getComputedStyle(mainContainer).paddingLeft,
                        ) +
                        parseFloat(
                            getComputedStyle(mainContainer).paddingRight,
                        );

                    const availableWidthForPanes =
                        totalWidth -
                        mainContainerPaddingLR -
                        verticalSplitter.offsetWidth;

                    if (availableWidthForPanes <= 0 && totalWidth > 0) {
                        return;
                    }
                    if (totalWidth === 0) {
                        requestAnimationFrame(setInitialLayout);
                        return;
                    }

                    const problemPaneBasis = availableWidthForPanes * 0.4;
                    const rightContainerBasis =
                        availableWidthForPanes - problemPaneBasis;

                    problemPane.style.flexBasis = `${problemPaneBasis}px`;
                    rightContainer.style.flexBasis = `${rightContainerBasis}px`;
                    problemPane.style.flexGrow = "0";
                    problemPane.style.flexShrink = "0";
                    rightContainer.style.flexGrow = "0";
                    rightContainer.style.flexShrink = "0";

                    requestAnimationFrame(() => {
                        const rightPaneHeight = rightContainer.offsetHeight;
                        const availableHeightInRightContainer =
                            rightPaneHeight - horizontalSplitter.offsetHeight;

                        if (availableHeightInRightContainer > 0) {
                            const editorPaneBasis =
                                availableHeightInRightContainer * 0.6;
                            const outputPaneBasis =
                                availableHeightInRightContainer -
                                editorPaneBasis;

                            editorPane.style.flexBasis = `${editorPaneBasis}px`;
                            outputPane.style.flexBasis = `${outputPaneBasis}px`;
                            editorPane.style.flexGrow = "0";
                            editorPane.style.flexShrink = "0";
                            outputPane.style.flexGrow = "0";
                            outputPane.style.flexShrink = "0";
                        } else {
                            editorPane.style.flexBasis = `60%`;
                            outputPane.style.flexBasis = `40%`;
                        }
                        updateLineNumbers();
                    });
                });
            }

            window.addEventListener("load", () => {
                const urlParams = new URLSearchParams(window.location.search);
                let questionId = urlParams.get("q");

                if (
                    questionId === null ||
                    questionId.trim() === "" ||
                    isNaN(parseInt(questionId))
                ) {
                    questionId = "0";
                    const newUrl = `${window.location.pathname}?q=${questionId}${window.location.hash}`;
                    window.history.replaceState({ path: newUrl }, "", newUrl);
                }

                setInitialLayout();
                loadQuestionData(questionId);
                initializePyodide();

                window.addEventListener("resize", () => {
                    setInitialLayout();
                });
                setTimeout(updateLineNumbers, 100);
            });

            window.addEventListener("popstate", (event) => {
                const urlParams = new URLSearchParams(window.location.search);
                let questionId = urlParams.get("q") || "0";
                loadQuestionData(questionId);
            });
        </script>
    </body>
</html>
